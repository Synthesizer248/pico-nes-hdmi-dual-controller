<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #eef6ff; stroke: #1e4f9a; stroke-width: 2; }
      .remote { fill: #f5f3ff; stroke: #5b21b6; stroke-width: 2; }
      .conn { fill: #fff7ed; stroke: #9a3412; stroke-width: 2; }
      .net { stroke: #111827; stroke-width: 2; fill: none; }
      .gnd { stroke: #374151; stroke-width: 2; fill: none; }
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: bold; fill: #111827; }
      .txt { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #374151; }
      .note { font-family: Arial, sans-serif; font-size: 14px; fill: #7c2d12; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="980"/>
  <text class="title" x="40" y="52">Dual Custom Controller Circuit (RP2040 Pico NES)</text>

  <rect class="box" x="40" y="110" width="430" height="760" rx="14"/>
  <text class="txt" x="70" y="150">Raspberry Pi Pico (RP2040)</text>
  <text class="small" x="70" y="178">Inputs configured as active-low with internal pull-ups</text>

  <text class="txt" x="70" y="230">P1: GP2 GP3 GP4 GP5 GP6 GP7 GP8 GP9</text>
  <text class="txt" x="70" y="270">P2: GP10 GP11 GP12 GP13 GP14 GP15 GP16 GP17</text>

  <text class="txt" x="70" y="330">Per signal protection:</text>
  <text class="txt" x="90" y="362">100R series resistor near Pico</text>
  <text class="txt" x="90" y="394">ESD TVS array at connector side</text>

  <text class="txt" x="70" y="454">Optional external pull-up:</text>
  <text class="txt" x="90" y="486">10k to 3V3 (for long cable/noisy env)</text>

  <text class="txt" x="70" y="546">Common ground shared to both remotes</text>

  <rect class="conn" x="120" y="610" width="260" height="120" rx="10"/>
  <text class="txt" x="190" y="650">J1 / J2</text>
  <text class="small" x="144" y="676">9-pin connector per controller</text>
  <text class="small" x="144" y="702">8 signals + 1 GND</text>

  <rect class="remote" x="560" y="120" width="380" height="360" rx="14"/>
  <text class="txt" x="690" y="158">Player 1 Remote</text>

  <text class="txt" x="600" y="210">A  B  Select  Start</text>
  <text class="txt" x="600" y="250">Up Down Left Right</text>
  <text class="small" x="600" y="294">Each push-button: signal line to GND when pressed</text>

  <rect class="remote" x="560" y="520" width="380" height="360" rx="14"/>
  <text class="txt" x="690" y="558">Player 2 Remote</text>

  <text class="txt" x="600" y="610">A  B  Select  Start</text>
  <text class="txt" x="600" y="650">Up Down Left Right</text>
  <text class="small" x="600" y="694">Same circuit as Player 1</text>

  <rect class="conn" x="1040" y="120" width="410" height="760" rx="14"/>
  <text class="txt" x="1130" y="160">Button Input Cell (x16 total)</text>

  <text class="txt" x="1070" y="230">GPIO ----[100R]----o-----> to cable</text>
  <text class="txt" x="1070" y="270">                    |</text>
  <text class="txt" x="1070" y="310">                  [TVS]</text>
  <text class="txt" x="1070" y="350">                    |</text>
  <text class="txt" x="1070" y="390">                   GND</text>

  <text class="txt" x="1070" y="460">Remote side:</text>
  <text class="txt" x="1070" y="500">signal ----o/ o---- GND  (push button)</text>

  <text class="txt" x="1070" y="570">Optional:</text>
  <text class="txt" x="1070" y="610">signal ----[10k]---- +3V3</text>

  <text class="txt" x="1070" y="680">Debounce done in firmware</text>
  <text class="small" x="1070" y="712">See src/controller.c integrator filter</text>

  <path class="net" d="M470 230 L560 230"/>
  <path class="net" d="M470 270 L560 270"/>
  <path class="net" d="M470 650 L560 650"/>

  <path class="net" d="M940 230 L1040 230"/>
  <path class="net" d="M940 650 L1040 650"/>

  <path class="gnd" d="M360 760 L360 800"/>
  <path class="gnd" d="M340 800 L380 800"/>
  <path class="gnd" d="M345 808 L375 808"/>
  <path class="gnd" d="M350 816 L370 816"/>

  <text class="small" x="390" y="812">Common GND</text>

  <text class="note" x="40" y="920">Use shielded cable or twisted pair for long controller runs. Keep ESD devices near external connectors.</text>
  <text class="note" x="40" y="944">Connector type can be RJ45/DB15/JST-based as long as pinout is documented consistently in firmware and hardware files.</text>
</svg>
