<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #eef5ff; stroke: #1e4f9a; stroke-width: 2; }
      .hdmi { fill: #fff4e6; stroke: #9a5a1e; stroke-width: 2; }
      .net { stroke: #1f2937; stroke-width: 2; fill: none; }
      .gnd { stroke: #374151; stroke-width: 2; fill: none; }
      .txt { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; }
      .small { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: bold; fill: #111827; }
      .warn { font-family: Arial, sans-serif; font-size: 15px; fill: #7c2d12; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <text class="title" x="40" y="52">RP2040 HDMI (TMDS) Reference Circuit (PicoDVI-style)</text>

  <rect class="box" x="50" y="120" width="420" height="620" rx="14"/>
  <text class="txt" x="80" y="160">Raspberry Pi Pico / RP2040</text>
  <text class="small" x="80" y="192">GPIO configured for PIO TMDS serializer</text>

  <text class="txt" x="80" y="245">GP18 -> TMDS D2+</text>
  <text class="txt" x="80" y="285">GP19 -> TMDS D2-</text>
  <text class="txt" x="80" y="325">GP20 -> TMDS D1+</text>
  <text class="txt" x="80" y="365">GP21 -> TMDS D1-</text>
  <text class="txt" x="80" y="405">GP22 -> TMDS D0+</text>
  <text class="txt" x="80" y="445">GP26 -> TMDS D0-</text>
  <text class="txt" x="80" y="485">GP27 -> TMDS CLK+</text>
  <text class="txt" x="80" y="525">GP28 -> TMDS CLK-</text>

  <text class="txt" x="80" y="585">GP14 <-> DDC_SCL (optional)</text>
  <text class="txt" x="80" y="625">GP15 <-> DDC_SDA (optional)</text>
  <text class="txt" x="80" y="665">GP13 <- HPD (optional)</text>

  <rect class="box" x="550" y="120" width="360" height="620" rx="14"/>
  <text class="txt" x="590" y="160">TMDS Resistor Network</text>
  <text class="small" x="590" y="192">Use matched 1% resistors, short traces</text>

  <text class="txt" x="590" y="245">Each TMDS line:</text>
  <text class="txt" x="610" y="278">RP2040 GPIO -> 270R series -> HDMI pin</text>
  <text class="txt" x="610" y="311">HDMI pin -> 130R -> GND</text>

  <text class="txt" x="590" y="365">DDC lines:</text>
  <text class="txt" x="610" y="398">SCL, SDA with 2.2k pull-up to +3V3</text>

  <text class="txt" x="590" y="452">HPD input:</text>
  <text class="txt" x="610" y="485">HDMI_HPD -> 1k/2k divider -> GPIO</text>

  <text class="txt" x="590" y="540">ESD protection:</text>
  <text class="txt" x="610" y="573">Low-cap TVS array on TMDS + DDC lines</text>

  <rect class="hdmi" x="980" y="120" width="360" height="620" rx="14"/>
  <text class="txt" x="1045" y="160">HDMI Type-A Connector</text>
  <text class="small" x="1030" y="192">TX-only use for console output</text>

  <text class="txt" x="1010" y="245">TMDS D2+ / D2-</text>
  <text class="txt" x="1010" y="285">TMDS D1+ / D1-</text>
  <text class="txt" x="1010" y="325">TMDS D0+ / D0-</text>
  <text class="txt" x="1010" y="365">TMDS CLK+ / CLK-</text>
  <text class="txt" x="1010" y="425">DDC SCL / SDA (optional)</text>
  <text class="txt" x="1010" y="465">HPD (optional readback)</text>
  <text class="txt" x="1010" y="505">+5V to HDMI pin (fused optional)</text>
  <text class="txt" x="1010" y="545">Shield + signal GND</text>

  <path class="net" d="M470 240 L550 240"/>
  <path class="net" d="M470 280 L550 280"/>
  <path class="net" d="M470 320 L550 320"/>
  <path class="net" d="M470 360 L550 360"/>
  <path class="net" d="M470 400 L550 400"/>
  <path class="net" d="M470 440 L550 440"/>
  <path class="net" d="M470 480 L550 480"/>
  <path class="net" d="M470 520 L550 520"/>

  <path class="net" d="M910 240 L980 240"/>
  <path class="net" d="M910 280 L980 280"/>
  <path class="net" d="M910 320 L980 320"/>
  <path class="net" d="M910 360 L980 360"/>
  <path class="net" d="M910 400 L980 400"/>
  <path class="net" d="M910 440 L980 440"/>
  <path class="net" d="M910 480 L980 480"/>
  <path class="net" d="M910 520 L980 520"/>

  <path class="net" d="M470 585 L550 585"/>
  <path class="net" d="M470 625 L550 625"/>
  <path class="net" d="M910 625 L980 625"/>
  <path class="net" d="M470 665 L550 665"/>
  <path class="net" d="M910 665 L980 665"/>

  <path class="gnd" d="M640 730 L640 770"/>
  <path class="gnd" d="M620 770 L660 770"/>
  <path class="gnd" d="M625 778 L655 778"/>
  <path class="gnd" d="M630 786 L650 786"/>
  <text class="small" x="672" y="782">Common GND</text>

  <text class="warn" x="40" y="830">Note: Pin choices are example defaults for this project. Adjust GPIO assignment in firmware and routing per board constraints.</text>
  <text class="warn" x="40" y="855">Follow a known PicoDVI hardware reference for production-level impedance, ESD, and connector implementation.</text>
</svg>
