name: Repo Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify key files
        run: |
          test -f README.md
          test -f CMakeLists.txt
          test -f src/main.c
          test -f src/controller.c
          test -f docs/build.md
          test -f docs/hardware.md
